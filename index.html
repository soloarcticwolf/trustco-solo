<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <section id="hero">
        <div class="hero-container">
          <img class="img-banner" src="/assets/images/hero5.png" alt="Header" />
          <div class="hero-content">
            <h1>
              Find a High-Potential <br />
              Customers with <span>Trustco</span>.
            </h1>
            <p>
              We provide sales teams and professionals with the knowledge, skill
              and discipline they need to be 10x more successful.
            </p>
            <div class="cta-container">
              <button class="cta-button primary-cta">Get Started</button>
              <button class="cta-button secondary-cta cta-image">
                <img src="/assets/images/Play.png" alt="Play button" />
                Check Our Video
              </button>
            </div>
          </div>
          <img class="img-banner" src="/assets/images/hero6.png" alt="Header" />
          <img
            class="img-banner mobile"
            src="/assets/images/Gr1.png"
            alt="Header"
          />
        </div>
      </section>
    </header>
    <main>This is the main body</main>
    <footer>This is the footer</footer>
  </body>
</html>
